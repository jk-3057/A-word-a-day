<body>
<div class="app-container" id="appRoot"></div>

<script>
    (function() {
        // ------------------------------------------------------------
        // 0. GEMINI API CONFIGURATION
        // ------------------------------------------------------------
        const GEMINI_API_KEY_PLACEHOLDER = "YOUR_GEMINI_API_KEY";
        const GEMINI_MODEL = "gemini-2.5-flash-lite";

        function getGeminiApiKey() {
            let key = localStorage.getItem("gemini_api_key");
            if (!key || key === "YOUR_GEMINI_API_KEY") {
                key = prompt("Enter your Gemini API key (get free at https://aistudio.google.com/):", GEMINI_API_KEY_PLACEHOLDER);
                if (key && key !== GEMINI_API_KEY_PLACEHOLDER) {
                    localStorage.setItem("gemini_api_key", key);
                } else {
                    key = null;
                }
            }
            return key;
        }

        async function evaluateWithGemini(sentence, targetWord) {
            const apiKey = getGeminiApiKey();
            if (!apiKey) throw new Error("Gemini API key not set.");

            const promptText = `You are an expert English teacher. Evaluate the following sentence that uses the word "${targetWord}".

Sentence: "${sentence}"

Return a JSON object with:
{
  "targetWordScore": number (0-10, how naturally and correctly "${targetWord}" is used),
  "grammarScore": number (0-10),
  "structureScore": number (0-10, complexity),
  "mechanicsScore": number (0-10, punctuation, spelling, capitalization),
  "feedback": "string (short, constructive feedback)",
  "grammarIssues": "string (list specific grammar mistakes or null if none)",
  "improvedSentence": "string (corrected version of the sentence)",
  "betterExample": "string (a different example sentence that uses the word well)"
}

The final total score (0-10) will be the average of the four scores. Be specific in grammarIssues.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: { temperature: 0.2, responseMimeType: "application/json" }
                })
            });

            if (!response.ok) throw new Error(`Gemini API error: ${response.status}`);
            const data = await response.json();

            let evaluation;
            try {
                const text = data.candidates[0].content.parts[0].text;
                evaluation = JSON.parse(text);
            } catch (e) {
                console.warn("Parsing failed, using robust fallback structure", e);
                evaluation = {
                    targetWordScore: 7,
                    grammarScore: 7,
                    structureScore: 6,
                    mechanicsScore: 8,
                    feedback: "Your sentence was received! However, the AI format needed a minor adjustment. Keep practicing directly with your words!",
                    grammarIssues: "Unable to parse micro-details securely.",
                    improvedSentence: sentence,
                    betterExample: `Try using it simply: "The context surrounding the word ${targetWord} matters."`
                };
            }

            const target = Math.min(10, Math.max(0, evaluation.targetWordScore ?? 5));
            const grammar = Math.min(10, Math.max(0, evaluation.grammarScore ?? 5));
            const structure = Math.min(10, Math.max(0, evaluation.structureScore ?? 5));
            const mechanics = Math.min(10, Math.max(0, evaluation.mechanicsScore ?? 5));
            const total = (target + grammar + structure + mechanics) / 4;

            return {
                targetWord: Math.round(target * 2 / 10),
                grammar: Math.round(grammar * 3 / 10),
                structure: Math.round(structure * 3 / 10),
                mechanics: Math.round(mechanics * 2 / 10),
                total: Math.round(total * 10) / 10,
                feedback: evaluation.feedback || "Good effort!",
                grammarIssues: evaluation.grammarIssues || "None detected.",
                improvedSentence: evaluation.improvedSentence || sentence,
                betterExample: evaluation.betterExample || `Consider: "The ${targetWord} phenomenon was evident everywhere."`
            };
        }

        // ------------------------------------------------------------
        // 1. STATE & MIGRATION
        // ------------------------------------------------------------
        const STATE_VERSION = 3;
        const STORAGE_KEY = "lexi_state";

        function getTodayDate() {
            const local = new Date();
            const yyyy = local.getFullYear();
            const mm = String(local.getMonth() + 1).padStart(2, '0');
            const dd = String(local.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function formatDate(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getPreviousDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            d.setDate(d.getDate() - 1);
            return formatDate(d);
        }

        function migrateState(raw) {
            // version < 3: ensure new fields exist
            if (!raw.dailyReviewSkippedDates) raw.dailyReviewSkippedDates = [];
            if (!raw.wordFeedbackLocked) raw.wordFeedbackLocked = {};
            if (!raw.profile || raw.profile.tagWeights === undefined) {
                raw.profile = { tagWeights: new Array(allTags.length).fill(0), difficultyShift: 0, lastDecayDate: null };
            }
            if (!raw.likedWords) raw.likedWords = [];
            if (!raw.dislikedWords) raw.dislikedWords = [];
            if (!raw.wordHistory) raw.wordHistory = [];
            if (!raw.dailyReviewScores) raw.dailyReviewScores = [];
            raw.version = STATE_VERSION;
            return raw;
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return null;
            try {
                const state = JSON.parse(raw);
                if (state.version !== STATE_VERSION) {
                    return migrateState(state);
                }
                return state;
            } catch (e) {
                return null;
            }
        }

        function saveState(state) {
            state.version = STATE_VERSION;
            state.lastUpdated = new Date().toISOString();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function getState() {
            let state = loadState();
            if (!state) {
                state = {
                    version: STATE_VERSION,
                    profile: { tagWeights: new Array(allTags.length).fill(0), difficultyShift: 0, lastDecayDate: null },
                    likedWords: [],
                    dislikedWords: [],
                    wordHistory: [],
                    dailyReviewScores: [],
                    dailyReviewSkippedDates: [],
                    wordFeedbackLocked: {},
                    appStartDate: null,
                    currentWord: null,
                    userLevel: null,
                    testCompleted: false
                };
            }
            const today = getTodayDate();
            if (state.profile.lastDecayDate !== today) {
                for (let i = 0; i < state.profile.tagWeights.length; i++) {
                    state.profile.tagWeights[i] = (state.profile.tagWeights[i] || 0) * 0.98;
                }
                state.profile.lastDecayDate = today;
                saveState(state);
            }
            return state;
        }

        function updateState(updater) {
            const state = getState();
            const newState = updater(state);
            saveState(newState);
            return newState;
        }

            { word: "magnanimous", level: "advanced", tags: ["generous"] },
            { word: "exacerbate", level: "advanced", tags: ["worsen"] },
            { word: "aggravate", level: "advanced", tags: ["worsen"] },
            { word: "deteriorate", level: "advanced", tags: ["decline"] },
            { word: "quintessential", level: "advanced", tags: ["ideal"] },
            { word: "ubiquity", level: "advanced", tags: ["pervasive"] },
            { word: "cacophony", level: "advanced", tags: ["sound"] },
            { word: "serendipity", level: "advanced", tags: ["fortune"] },
            { word: "mellifluous", level: "advanced", tags: ["sound", "pleasant"] },
            { word: "esoteric", level: "advanced", tags: ["specialized"] },
            { word: "perfunctory", level: "advanced", tags: ["careless"] },
            { word: "capricious", level: "advanced", tags: ["unpredictable"] },
            { word: "tenuous", level: "advanced", tags: ["weak"] },
            { word: "parsimonious", level: "advanced", tags: ["stingy"] }
        ];

        const allTags = [...new Set(CANDIDATE_WORDS.flatMap(w => w.tags))];
        const TAG_INDEX = Object.fromEntries(allTags.map((tag, idx) => [tag, idx]));

        function getTagVector(wordObj) {
            const vec = new Array(allTags.length).fill(0);
            wordObj.tags.forEach(tag => { if (TAG_INDEX[tag] !== undefined) vec[TAG_INDEX[tag]] = 1; });
            return vec;
        }

        function updateProfileWithFeedback(wordObj, isLike) {
            const state = getState();
            const vec = getTagVector(wordObj);
            const delta = isLike ? 1 : -1;
            for (let i = 0; i < vec.length; i++) {
                if (vec[i]) state.profile.tagWeights[i] = (state.profile.tagWeights[i] || 0) + delta;
            }
            saveState(state);
        }

        function applyCalibrationDifficulties(ratings) {
            const state = getState();
            let shift = 0;
            ratings.forEach(r => { if (r.response === "too_easy") shift += 0.4; else if (r.response === "too_hard") shift -= 0.4; });
            state.profile.difficultyShift = Math.min(1.5, Math.max(-1.5, (state.profile.difficultyShift || 0) + shift));
            saveState(state);
        }

        function selectPersonalizedWordML(userLevel, recentlyShown = []) {
            let baseLevel = userLevel;
            const state = getState();
            const profile = state.profile;
            if (profile.difficultyShift > 0.3 && baseLevel !== "advanced") {
                if (baseLevel === "beginner") baseLevel = "intermediate";
                else if (baseLevel === "intermediate") baseLevel = "advanced";
            } else if (profile.difficultyShift < -0.3 && baseLevel !== "beginner") {
                if (baseLevel === "advanced") baseLevel = "intermediate";
                else if (baseLevel === "intermediate") baseLevel = "beginner";
            }
            let candidates = CANDIDATE_WORDS.filter(w => w.level === baseLevel);
            if (candidates.length === 0) candidates = CANDIDATE_WORDS.filter(w => w.level === "intermediate");

            const scored = candidates.map(candidate => {
                let score = 0.5;
                const tagVec = getTagVector(candidate);
                for (let i=0; i<tagVec.length; i++) {
                    if (tagVec[i]) score += (profile.tagWeights[i] || 0) * 0.2;
                }
                if (recentlyShown.includes(candidate.word)) score *= 0.2;
                return { word: candidate, score: Math.max(0.01, score) };
            });
            const totalScore = scored.reduce((sum, s) => sum + s.score, 0);
            let rand = Math.random() * totalScore, accum = 0;
            for (let item of scored) {
                accum += item.score;
                if (rand <= accum) return item.word;
            }
            return scored[0].word;
        }

        async function fetchWordData(word) {
            const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                if (data && data[0]) {
                    const entry = data[0];
                    const phonetic = entry.phonetic || `/${word.toLowerCase()}/`;
                    let definitions = [], synonymsSet = new Set(), primaryExample = "";
                    for (const meaning of entry.meanings.slice(0, 3)) {
                        for (const defObj of meaning.definitions.slice(0, 2)) {
                            definitions.push({ part: meaning.partOfSpeech, definition: defObj.definition });
                            if (defObj.example && !primaryExample) primaryExample = defObj.example;
                            if (defObj.synonyms) defObj.synonyms.forEach(s => synonymsSet.add(s));
                        }
                        if (meaning.synonyms) meaning.synonyms.forEach(s => synonymsSet.add(s));
                    }
                    if (!primaryExample && definitions.length) primaryExample = `“${word}” means ${definitions[0].definition.toLowerCase()}.`;
                    return {
                        phonetic,
                        definitions: definitions.slice(0,4),
                        example: primaryExample,
                        synonyms: Array.from(synonymsSet).slice(0,5),
                        fallback: false
                    };
                }
                throw new Error();
            } catch {
                return {
                    phonetic: `/${word.toLowerCase()}/`,
                    definitions: [{ part: "word", definition: "An expressive term worth knowing." }],
                    example: `Expand your lexicon with "${word}".`,
                    synonyms: [],
                    fallback: true
                };
            }
        }

        // ------------------------------------------------------------
        // 3. DAILY WORD & FEEDBACK
        // ------------------------------------------------------------
        async function generateFreshWord(userLevel) {
            const recentHistory = getRecentHistoryWords();
            const selected = selectPersonalizedWordML(userLevel, recentHistory);
            const dictData = await fetchWordData(selected.word);
            return {
                wordText: selected.word,
                phonetic: dictData.phonetic,
                definitions: dictData.definitions,
                example: dictData.example,
                synonyms: dictData.synonyms,
                level: selected.level,
                date: getTodayDate(),
                fallback: dictData.fallback
            };
        }

        function getRecentHistoryWords() {
            const state = getState();
            return state.wordHistory.slice(-7).map(entry => entry.wordData.wordText);
        }

        async function getOrCreateWordOfTheDay(userLevel) {
            let state = getState();
            const today = getTodayDate();
            if (!state.appStartDate) {
                state.appStartDate = today;
                saveState(state);
            }
            if (!state.currentWord || state.currentWord.date !== today) {
                const fresh = await generateFreshWord(userLevel);
                state.currentWord = fresh;
                state.wordHistory.push({ date: today, wordData: fresh });
                if (state.wordHistory.length > 35) state.wordHistory.shift();
                saveState(state);
                return fresh;
            }
            return state.currentWord;
        }

        function isWordFeedbackLocked(wordText) {
            const state = getState();
            return !!state.wordFeedbackLocked[wordText];
        }

        function lockWordFeedback(wordText) {
            updateState(state => {
                state.wordFeedbackLocked[wordText] = true;
                return state;
            });
        }

        function applyLike(wordText) {
            const wordObj = CANDIDATE_WORDS.find(w => w.word === wordText);
            if (!wordObj) return;
            updateState(state => {
                state.dislikedWords = state.dislikedWords.filter(w => w !== wordText);
                if (!state.likedWords.includes(wordText)) {
                    state.likedWords.push(wordText);
                    updateProfileWithFeedback(wordObj, true);
                }
                state.wordFeedbackLocked[wordText] = true;
                return state;
            });
        }

        function applyDislike(wordText) {
            const wordObj = CANDIDATE_WORDS.find(w => w.word === wordText);
            if (!wordObj) return;
            updateState(state => {
                state.likedWords = state.likedWords.filter(w => w !== wordText);
                if (!state.dislikedWords.includes(wordText)) {
                    state.dislikedWords.push(wordText);
                    updateProfileWithFeedback(wordObj, false);
                }
                state.wordFeedbackLocked[wordText] = true;
                return state;
            });
        }

        // ------------------------------------------------------------
        // 4. STREAK (consecutive days with word in history)
        // ------------------------------------------------------------
        function computeStreak() {
            const state = getState();
            const history = state.wordHistory;
            if (!history.length) return 0;
            const dateSet = new Set(history.map(h => h.date));
            const sortedDates = [...dateSet].sort().reverse();
            let streak = 0;
            let expectedDate = sortedDates[0];
            for (let date of sortedDates) {
                if (date === expectedDate) {
                    streak++;
                    expectedDate = getPreviousDate(expectedDate);
                } else {
                    break;
                }
            }
            return streak;
        }

        // ------------------------------------------------------------
        // 5. DAILY REVIEW & SKIP LOGIC
        // ------------------------------------------------------------
        function hasReviewedToday() {
            const state = getState();
            const today = getTodayDate();
            return state.dailyReviewScores.some(r => r.date === today);
        }

        function hasSkippedToday() {
            const state = getState();
            const today = getTodayDate();
            return state.dailyReviewSkippedDates.includes(today);
        }

        function canDoDailyReview() {
            if (hasReviewedToday() || hasSkippedToday()) return false;
            const now = new Date();
            return now.getHours() >= 17;
        }

        function markDailyReviewSkipped() {
            updateState(state => {
                const today = getTodayDate();
                if (!state.dailyReviewSkippedDates.includes(today)) {
                    state.dailyReviewSkippedDates.push(today);
                }
                return state;
            });
        }

        function getYesterdayScore() {
            const state = getState();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate()-1);
            const yStr = formatDate(yesterday);
            const yEntry = state.dailyReviewScores.find(s => s.date === yStr);
            return yEntry ? yEntry.score : null;
        }

        const PLACEMENT_QUESTIONS = [
            { text: "What does 'enormous' mean?", options: ["Very small", "Very large", "Very bright", "Very fast"], correct: 1, difficulty: 1 },
            { text: "Which word is the best synonym for 'quick'?", options: ["Slow", "Rapid", "Lazy", "Heavy"], correct: 1, difficulty: 1 },
            { text: "Choose the correct word: 'After months of drought, the rain helped ______ the farmers’ anxiety.'", options: ["Exacerbate", "Assuage", "Neglect", "Obfuscate"], correct: 1, difficulty: 4 },
            { text: "What does 'mitigate' mean?", options: ["To worsen", "To lessen severity", "To celebrate", "To ignore"], correct: 1, difficulty: 3 },
            { text: "Select the word that fits: 'Her explanation was remarkably ______; every detail was easy to follow.'", options: ["Lucid", "Vague", "Cryptic", "Muddled"], correct: 0, difficulty: 3 },
            { text: "Which of these means 'to deliberately make unclear'?", options: ["Clarify", "Illuminate", "Obfuscate", "Simplify"], correct: 2, difficulty: 5 },
            { text: "Choose the synonym for 'ephemeral':", options: ["Eternal", "Temporary", "Ubiquitous", "Onerous"], correct: 1, difficulty: 5 },

            { text: "What does 'ubiquitous' describe?", options: ["Rare", "Everywhere", "Invisible", "Powerful"], correct: 1, difficulty: 4 }
        ];
        function computeLevelFromScore(total, max) { let p = (total/max)*100; return p<=35?"beginner":p<=65?"intermediate":"advanced"; }

        const CALIBRATION_WORDS = [
            { word: "quick", level: "beginner" }, { word: "persistent", level: "intermediate" },
            { word: "ubiquitous", level: "intermediate" }, { word: "ephemeral", level: "advanced" },
            { word: "obfuscate", level: "advanced" }
        ];

        async function renderCalibration(onComplete) {
            let currentIdx = 0, responses = [];
            const container = document.createElement('div'); container.className = 'calibration-card';
            document.getElementById('appRoot').innerHTML = ''; document.getElementById('appRoot').appendChild(container);
            function render() {
                const w = CALIBRATION_WORDS[currentIdx];
                container.innerHTML = `
                    <div class="quiz-header">
                        <div class="calibration-word">${w.word}</div>
                        <div class="small-note">How was this word for you?</div>
                    </div>
                    <div class="calibration-options">
                        <div class="calibration-option" data-response="too_easy">Too easy</div>
                        <div class="calibration-option" data-response="just_right">Just right</div>
                        <div class="calibration-option" data-response="too_hard">Too hard</div>
                    </div>
                    <div class="quiz-nav">
                        <button id="prevCalibBtn" class="quiz-btn secondary" ${currentIdx===0?'disabled':''}>← Previous</button>
                        <button id="nextCalibBtn" class="quiz-btn">${currentIdx===CALIBRATION_WORDS.length-1?'Finish':'Next →'}</button>
                    </div>
                `;
                if (responses[currentIdx]) {
                    document.querySelectorAll('.calibration-option').forEach(opt => { if(opt.dataset.response === responses[currentIdx]) opt.classList.add('selected'); });
                }
                document.querySelectorAll('.calibration-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        document.querySelectorAll('.calibration-option').forEach(o=>o.classList.remove('selected'));
                        opt.classList.add('selected');
                        responses[currentIdx] = opt.dataset.response;
                    });
                });
                document.getElementById('prevCalibBtn').addEventListener('click', () => { if(currentIdx>0) { currentIdx--; render(); } });
                document.getElementById('nextCalibBtn').addEventListener('click', () => {
                    if(!responses[currentIdx]) { alert("Select an option"); return; }
                    if(currentIdx === CALIBRATION_WORDS.length-1) {
                        applyCalibrationDifficulties(responses.map((r,i)=>({word:CALIBRATION_WORDS[i].word, response:r})));
                        onComplete();
                    } else { currentIdx++; render(); }
                });
            }
            render();
        }

                        if(currentIndex === PLACEMENT_QUESTIONS.length-1) {

                            else alert("Answer all");
                        } else { currentIndex++; buildUI(); }

                }
                async function finishQuiz() {
                    let total=0,max=0;
                    for(let i=0;i<PLACEMENT_QUESTIONS.length;i++){
                        max+=PLACEMENT_QUESTIONS[i].difficulty;
                        if(answers[i]===PLACEMENT_QUESTIONS[i].correct) total+=PLACEMENT_QUESTIONS[i].difficulty;
                    }
                    const userLevel = computeLevelFromScore(total,max);
                    await renderCalibration(async () => {
                        localStorage.removeItem(STORAGE_KEY);
                        const state = {
                            version: STATE_VERSION,
                            profile: { tagWeights: new Array(allTags.length).fill(0), difficultyShift: 0, lastDecayDate: getTodayDate() },
                            likedWords: [], dislikedWords: [], wordHistory: [], dailyReviewScores: [], dailyReviewSkippedDates: [], wordFeedbackLocked: {},
                            appStartDate: getTodayDate(), currentWord: null, userLevel: userLevel, testCompleted: true
                        };
                        const freshWord = await generateFreshWord(userLevel);
                        state.currentWord = freshWord;
                        state.wordHistory.push({ date: getTodayDate(), wordData: freshWord });
                        saveState(state);
                        onComplete(userLevel);
                    });
                }
                buildUI();
            });
        }

            document.getElementById('resetAppButton')?.addEventListener('click',()=>{ if(confirm("Reset all progress?")){ localStorage.clear(); initApp(); } });
            document.getElementById('speakerBtn')?.addEventListener('click', speakWord);
            const reviewBtn = document.getElementById('dailyReviewBtn');
            if (reviewBtn) reviewBtn.addEventListener('click', () => { showDailyReviewModal(currentWordObj, (done) => { renderDashboard(appEl, userLevel, currentWordObj, refreshCallback); }); });
            if (!isLocked) {
                const likeBtn = document.getElementById('likeButton'), dislikeBtn = document.getElementById('dislikeButton'), confirmBtn = document.getElementById('confirmFeedbackBtn');
                let selected = null;
                const update = () => {
                    if (selected === 'like') { likeBtn.classList.add('liked'); dislikeBtn.classList.remove('disliked'); }
                    else if (selected === 'dislike') { dislikeBtn.classList.add('disliked'); likeBtn.classList.remove('liked'); }
                    else { likeBtn.classList.remove('liked'); dislikeBtn.classList.remove('disliked'); }
                };
                likeBtn.onclick = () => { selected = 'like'; update(); confirmBtn.style.display = 'inline-flex'; };
                dislikeBtn.onclick = () => { selected = 'dislike'; update(); confirmBtn.style.display = 'inline-flex'; };
                confirmBtn.onclick = () => {
                    if (selected === 'like') applyLike(wordText);
                    else if (selected === 'dislike') applyDislike(wordText);
                    renderDashboard(appEl, userLevel, currentWordObj, refreshCallback);
                };
            }
        }

        async function initApp() {
            const appRoot = document.getElementById('appRoot');
            const state = getState();
            if (!state.testCompleted || !state.userLevel) {
                renderOnboarding(appRoot, async (newLevel) => {
                    const wordObj = await getOrCreateWordOfTheDay(newLevel);
                    renderDashboard(appRoot, newLevel, wordObj, () => {});
                });
                return;
            }
            const userLevel = state.userLevel;
            appRoot.innerHTML = '<div class="loading-indicator">loading your daily word...</div>';
            let currentWordObj = await getOrCreateWordOfTheDay(userLevel);
            renderDashboard(appRoot, userLevel, currentWordObj, () => {});
        }

        initApp();
    })();
</script>
</body>
</html>
